# Render Blueprint — PriceIQ Italia
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: priceiq-italia
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PROXY_URL
        sync: false
